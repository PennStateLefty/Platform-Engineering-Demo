name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "UV_BIN=$HOME/.local/bin" >> $GITHUB_ENV
        env:
          UV_NO_MODIFY_PATH: 1

      - name: Sync dependencies (uv)
        run: |
          $HOME/.local/bin/uv sync --dev

      - name: Lint (ruff via uv)
        run: $HOME/.local/bin/uv run ruff check .

      - name: Run unit & contract tests
        run: $HOME/.local/bin/uv run pytest

      - name: Validate OpenAPI spec
        run: |
          $HOME/.local/bin/uv run python -c "import yaml,sys; from openapi_spec_validator import validate; spec=yaml.safe_load(open('specs/openapi.yaml')); validate(spec); print('OpenAPI spec validation: OK')"

  # Placeholder for future security scanning job
  security-scan:
    runs-on: ubuntu-latest
    needs: build-test
    if: always()
    steps:
      - name: Placeholder
        run: echo "Security scanning to be implemented (e.g., pip-audit, Trivy)."
